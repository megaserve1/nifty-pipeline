# FEATURE REGISTRY -- the MENU. written by bridge/register.py.
#
# clock      : the feature's bar period. MEASURED from the data. if the feature team
#              tells you a different number, put THEIRS here -- build_dataset re-measures
#              and shouts if they disagree.
# na_policy  : what this feature's NaN MEANS. the feature team should set this.
#     sentinel  NaN is a real state, not missing data (e.g. 'there is no gap').
#               kept as NaN for xgboost/catboost; given an impossible value for
#               random forest so it becomes its own branch. NEVER 0, never the mean.
#     zero      NaN honestly means zero (a count of nothing).
#     ffill     a slow value on fast rows -- carry the last one forward.
#     drop      the row is unusable; exclude it.
# desc       : a one-line note for the human reading the ballot.
