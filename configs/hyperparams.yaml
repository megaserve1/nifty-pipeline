# ============================================================================
#  configs/hyperparams.yaml -- THE one source of every model setting.
#  train.py reads `default:`.  hpo.py reads `search:`.  no number lives in python.
# ============================================================================
#
# h2 = the manager's set, 2026-07-20 (file "hyperparameter 20072026"). depth-based, regularised.
#
# h3 = DELIBERATE MAX-OVERFIT, LOSS-BASED (leaf-wise), 2026-07-21. xgboost + catboost only.
#      the goal is to overfit as HARD as possible -- a capacity/sanity probe: if the model cannot
#      drive TRAIN error near zero, the features carry no signal or the pipeline is broken. every
#      knob below is turned toward memorising the training set. it is NOT a model to deploy.
#      random_forest is left at its h2 values (it is not part of this run).
#
#      TWO of these changes REVERSE earlier decisions -- both are required to overfit, both are
#      marked "OVERFIT REVERSAL" so you can put them back:
#        1. early stopping OFF  (you insisted on it on 07-19; but it is an ANTI-overfit brake)
#        2. no row/feature/scoring randomness (regularisers that fight overfit)
hyperparams_version: h3

random_forest:
  default:
    n_estimators: 3000
    max_depth: 20
    min_samples_leaf: 10
    max_features: "0.8"
    max_samples: 0.8
    seed: 42
  search:
    # Scale: [Conservative, Balanced/Actual, Extreme]
    #
    # CHANGED FROM THE DELIVERED FILE: the last rung was `None`, it is now `0`.
    #   the delivered note said "max_depth uses `None` instead of `0` to properly trigger
    #   scikit-learn's unlimited depth". that is right about sklearn and wrong about this file,
    #   for two reasons:
    #
    #   1. YAML does not read `None` as null. `yaml.safe_load("[10, 20, 30, None]")` gives
    #      [10, 20, 30, 'None'] -- the four-character STRING. (yaml's null is `null` or `~`.)
    #   2. every hyperparameter reaches the trainer as a string, and merge() casts it using the
    #      type of the default. max_depth's default is an int, so 'None' goes to int('None') and
    #      the trial exits. verified:
    #          H.merge("random_forest", {"max_depth": "None"})
    #          -> SystemExit: --max_depth='None' is not a valid int
    #      one rung in four = a quarter of every RF trial dead, and optuna would read those
    #      crashes as "that region is bad" rather than "that rung is broken".
    #
    #   0 already IS this pipeline's unlimited: build_model does `max_depth=params["max_depth"]
    #   or None`, so 0 -> None -> sklearn grows the tree out. same intent, and it survives the
    #   round trip through ClearML.
    max_depth: [10, 20, 30, 0]              # 0 = unlimited (NOT None -- see above)
    min_samples_leaf: [50, 25, 10, 2]
    max_features: ["0.2", "0.5", "0.8", "1.0"]
    max_samples: [0.5, 0.7, 0.8, 1.0]
    n_estimators: [500, 1500, 3000, 5000]   # Budget knob: higher only costs time, doesn't overfit

xgboost:
  default:
    # ===== h3 MAX-OVERFIT, LOSS-BASED. the values below are the set YOU handed over 2026-07-21. =====
    grow_policy: "lossguide"     # LOSS-BASED (leaf-wise).
    max_leaves: 0                # 0 = UNLIMITED leaves (xgboost) -- no cap on tree width.
    max_depth: 0                 # 0 = UNLIMITED depth. leaves+depth both uncapped = max capacity.
    max_bin: 512                 # finer histogram (default 256) -> finer splits -> more overfit.
    n_estimators: 6000           # (not in your list -- kept)
    early_stopping_rounds: 0     # OVERFIT REVERSAL: OFF. (not in your list -- off is required to
                                 #   overfit; early stopping halts on VAL and PREVENTS it.)
    learning_rate: 0.1           # (not in your list -- kept a fast rate)
    subsample: 0.8               # your value.
    colsample_bytree: 0.9        # your value.
    # THESE MUST BE FLOATS (note the .0). merge() casts every HPO override to the TYPE of the
    # default here; the search spaces contain fractions (gamma 0.3/0.5, reg_lambda 0.1), so an
    # INTEGER default makes int("0.3") fail and the trial dies ("not a whole number"). that is
    # exactly what killed the gamma=0.3 trials on 2026-07-22. keep the .0.
    min_child_weight: 5.0        # your value (5).
    reg_lambda: 3.0              # your value (3) -- FLOAT so search rung 0.1 casts.
    reg_alpha: 0.0               # (not in your list -- 0)
    gamma: 0.0                   # your value (0) -- FLOAT so search rungs 0.3/0.5 cast.
    seed: 42
    # NOTE: max_leaves 0 + max_depth 0 means trees can grow UNBOUNDED on 513k rows. that is the
    # most overfit-prone AND the slowest/most memory-hungry setting. if a trial crawls or an agent
    # OOMs, cap one of them (e.g. max_leaves 4095).
  search:
    # Scale: [Conservative, Balanced/Actual, Extreme]
    max_depth: [3, 7, 10, 14]
    learning_rate: [0.01, 0.02, 0.05, 0.1]
    n_estimators: [500, 2000, 4000, 6000]
    subsample: [0.5, 0.6, 0.8, 1.0]
    colsample_bytree: [0.5, 0.6, 0.8, 1.0]
    min_child_weight: [20.0, 15.0, 5.0, 1.0]
    reg_lambda: [20.0, 5.0, 1.0, 0.1]       # L2 Regularization
    reg_alpha: [5.0, 1.0, 0.2, 0.0]         # L1 Regularization
    gamma: [1.0, 0.5, 0.3, 0.0]

catboost:
  default:
    # ===== h3 MAX-OVERFIT, LOSS-BASED. (h2 values in trailing comments for a clean revert.) =====
    grow_policy: "Lossguide"     # LOSS-BASED (leaf-wise). was SymmetricTree = the MOST depth-based
                                 #   form (oblivious trees). Lossguide is the opposite.
    max_leaves: 512              # THE capacity knob under Lossguide. big.  (SymmetricTree had none.)
    max_depth: 12                # a CAP only (leaves rule). NOT 16 -- depth-16 leaf-wise trees are
                                 #   enormous and crawl. 12 already gives huge capacity.  (was 11)
    n_estimators: 6000
    early_stopping_rounds: 0     # OVERFIT REVERSAL: OFF (was 200). same reason as xgboost.
    learning_rate: 0.1           # fast fit.  (was 0.02)
    l2_leaf_reg: 1.0             # near-minimum L2 (catboost needs > 0).  (was 5.0)
    min_data_in_leaf: 1          # leaves down to a single row.  (was 15)
    rsm: 1.0                     # OVERFIT REVERSAL: all features.  (was 0.6)
    subsample: 1.0               # OVERFIT REVERSAL: all rows (MVS at 1.0 = no subsampling). (was 0.6)
    bootstrap_type: "MVS"        # kept -- MVS + subsample 1.0 already means "use everything".
    random_strength: 0.0         # OVERFIT REVERSAL: no noise when scoring splits.  (was 1.0)
    seed: 42
  search:
    # Scale: [Conservative, Balanced/Actual, Extreme]
    # Note: max_depth > 12 on oblivious trees is massive. 15 is highly extreme and slow.
    # (kept as delivered. 2^15 = 32,768 leaves per tree x 6000 trees -- if a trial picks 15 it
    #  will dominate the whole search. it is a real rung, just an expensive one.)
    max_depth: [4, 8, 11, 15]
    learning_rate: [0.01, 0.02, 0.05, 0.1]
    n_estimators: [500, 2000, 4000, 6000]
    l2_leaf_reg: [30.0, 10.0, 5.0, 1.0]
    min_data_in_leaf: [50, 25, 15, 5]
    rsm: [0.5, 0.6, 0.8, 1.0]               # Column sampling
    subsample: [0.5, 0.6, 0.8, 1.0]         # Row sampling
    random_strength: [5.0, 1.0, 0.5, 0.0]   # Scoring noise: high = conservative, 0 = extreme
